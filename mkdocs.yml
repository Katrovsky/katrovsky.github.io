site_name: Stranded
site_url: https://katrovsky.github.io/
site_description: Вики для курьеров СберМаркета.
site_author: Кирилл Катровский
nav:
  - Главная: index.md
  - Своими словами:
    - Взаимоотношения: more/relationships.md
    - Акции: more/promotions.md
  - Shopper:
    - Установка: shopper/index.md
    - Интерфейс: shopper/interface.md
  - Контакты: contact.md
  - О сайте: about.md

theme:
  name: material
  icon:
    favicon: images/favicon.png
    logo: material/bike-fast
    admonition:
      note: fontawesome/solid/note-sticky
      abstract: fontawesome/solid/book
      info: fontawesome/solid/circle-info
      tip: fontawesome/solid/bullhorn
      success: fontawesome/solid/check
      question: fontawesome/solid/circle-question
      warning: fontawesome/solid/triangle-exclamation
      failure: fontawesome/solid/bomb
      danger: fontawesome/solid/skull
      bug: fontawesome/solid/robot
      example: fontawesome/solid/flask
      quote: fontawesome/solid/quote-left
  language: ru
  features:
   - search.suggest
   - navigation.instant
   - navigation.instant.prefetch
   - navigation.instant.progress
#  - navigation.tabs
#  - navigation.tabs.sticky
#  - navigation.sections
   - navigation.expand
   - navigation.path
   - navigation.prune
   - navigation.top
   - content.tooltips

  palette:

    # Palette toggle for automatic mode
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Светлый режим

    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default 
      toggle:
        icon: material/brightness-7
        name: Тёмный режим

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Цветовая схема устройства

copyright: Copyright &copy; 2024 Kirill K.
extra:
  generator: false

plugins:
 - search
 - glightbox:
       touchNavigation: true
       loop: true
       effect: zoom
       slide_effect: slide
       width: 100%
       height: auto
       zoomable: true
       draggable: true
       auto_caption: false
       caption_position: bottom
       background: white
       shadow: true
 - social
#       enabled: !ENV [CI, false]

markdown_extensions:
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - def_list
  - attr_list
  - md_in_html
  - pymdownx.tasklist:
      custom_checkbox: true