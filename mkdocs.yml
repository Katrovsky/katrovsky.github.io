site_name: Stranded
site_url: https://katrovsky.github.io
site_description: Вики для курьеров СберМаркета.
site_author: Кирилл Катровский
nav:
  - Главная: index.md
  - Своими словами:
    - Взаимоотношения: more/relationships.md
    - Акции: more/promotions.md
  - Shopper:
    - Установка: shopper/index.md
    - Интерфейс: shopper/interface.md
  - Контакты: contact.md
  - О сайте: about.md

theme:
  language: ru
  name: material
  custom_dir: docs/overrides
  icon:
    favicon: images/favicon.png
    logo: material/bike-fast
    admonition:
      note: fontawesome/solid/note-sticky
      abstract: fontawesome/solid/book
      info: fontawesome/solid/circle-info
      tip: fontawesome/solid/bullhorn
      success: fontawesome/solid/check
      question: fontawesome/solid/circle-question
      warning: fontawesome/solid/triangle-exclamation
      failure: fontawesome/solid/bomb
      danger: fontawesome/solid/skull
      bug: fontawesome/solid/robot
      example: fontawesome/solid/flask
      quote: fontawesome/solid/quote-left
  features:
   - search.suggest
   - navigation.instant
   - navigation.instant.progress
#  - navigation.tabs
#  - navigation.tabs.sticky
#  - navigation.sections
   - navigation.expand
#  - navigation.prune
   - navigation.top
   - navigation.indexes
   - content.tooltips
   - toc.follow


  palette:

    # Palette toggle for automatic mode
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Светлый режим

    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default 
      toggle:
        icon: material/brightness-7
        name: Тёмный режим

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Цветовая схема устройства

copyright: Copyright &copy; 2024 Kirill K.
extra:
  generator: false

plugins:
  - search
  - social:
      enabled: !ENV [CI, false]
  - glightbox:
      touchNavigation: true
      loop: true
      effect: fade
      slide_effect: fade
      width: 100%
      height: auto
      zoomable: true
      draggable: true
      auto_caption: false
      caption_position: bottom
      background: Gainsboro
      shadow: true
  - git-revision-date-localized:
      locale: ru

markdown_extensions:
 - meta
 - pymdownx.critic
 - pymdownx.caret
 - pymdownx.keys
 - pymdownx.mark
 - pymdownx.tilde
 - admonition
 - pymdownx.details
 - pymdownx.superfences
 - def_list
 - attr_list
 - md_in_html
 - pymdownx.tasklist:
     custom_checkbox: true